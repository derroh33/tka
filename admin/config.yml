backend:
  name: github
  repo: derroh33/tka
  branch: main

media_folder: "wp-content/uploads"
public_folder: "/wp-content/uploads"

collections:
  - name: "tours"
    label: "Tours"
    folder: "tours"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tour Title", name: "title", widget: "string" }
      - { label: "Tour Image", name: "image", widget: "image" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Gallery"
    folder: "gallery"
    create: true
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string" }